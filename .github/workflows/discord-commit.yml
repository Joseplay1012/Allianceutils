name: Discord Commit Embed

on:
  push:
    branches:
      - main
      - master
      - a

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits from push
        id: commits
        run: |
          RANGE="${{ github.event.before }}..${{ github.event.after }}"

          COMMITS=$(git log $RANGE --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s — %an")

          [ -z "$COMMITS" ] && COMMITS="(Nenhum commit encontrado)"

          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send embed to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMITS: ${{ steps.commits.outputs.list }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          jq -n \
            --arg title "📦 Push em $REPO" \
            --arg desc "$COMMITS" \
            --arg actor "$ACTOR" \
            '{
              username: "GitHub",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                title: $title,
                description: $desc,
                color: 5793266,
                author: {
                  name: $actor,
                  icon_url: ("https://github.com/" + $actor + ".png")
                }
              }]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "$WEBHOOK"
